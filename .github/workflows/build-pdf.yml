name: Build Thesis PDF

on:
  push:
    branches: [main, master]
    paths:
      - 'content/**'
      - 'cover/**'
      - 'chapter/**'
      - 'figures/**'
      - 'templates/**'
      - 'main.tex'
      - 'references.bib'
      - 'build/**'
      - 'Makefile'
  workflow_dispatch:

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live & dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-full \
            pandoc \
            curl

      - name: Download IEEE CSL (if not cached)
        run: |
          mkdir -p templates
          if [ ! -f templates/ieee.csl ]; then
            curl -sL "https://raw.githubusercontent.com/citation-style-language/styles/master/ieee.csl" \
              -o templates/ieee.csl
          fi

      - name: Convert Markdown to LaTeX
        run: bash build/build.sh

      - name: Compile PDF (full build with bibliography)
        run: |
          pdflatex -interaction=nonstopmode main.tex
          bibtex main || true
          pdflatex -interaction=nonstopmode main.tex
          pdflatex -interaction=nonstopmode main.tex

      - name: Push PDF to Tranduy1dol/curve1024
        env:
          PAT: ${{ secrets.CURVE1024_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the target repo using PAT
          git clone https://x-access-token:${PAT}@github.com/Tranduy1dol/curve1024.git target-repo

          # Copy PDF into docs/
          mkdir -p target-repo/docs
          cp main.pdf target-repo/docs/thesis.pdf

          # Commit and push if there are changes
          cd target-repo
          git add docs/thesis.pdf
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update thesis PDF [skip ci]"
          git push
