name: Build Thesis PDF

on:
  push:
    branches: [main, master]
    paths:
      - 'content/**'
      - 'cover/**'
      - 'chapter/**'
      - 'figures/**'
      - 'templates/**'
      - 'main.tex'
      - 'references.bib'
      - 'build/**'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live & dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-full \
            pandoc \
            curl

      - name: Download IEEE CSL (if not cached)
        run: |
          mkdir -p templates
          if [ ! -f templates/ieee.csl ]; then
            curl -sL "https://raw.githubusercontent.com/citation-style-language/styles/master/ieee.csl" \
              -o templates/ieee.csl
          fi

      - name: Convert Markdown to LaTeX
        run: bash build/build.sh

      - name: Compile PDF (full build with bibliography)
        run: |
          pdflatex -interaction=nonstopmode main.tex
          bibtex main || true
          pdflatex -interaction=nonstopmode main.tex
          pdflatex -interaction=nonstopmode main.tex

      - name: Prepare docs folder
        run: |
          mkdir -p docs
          cp main.pdf docs/thesis.pdf

      - name: Commit and push PDF to docs/
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update thesis PDF [skip ci]"
          file_pattern: docs/thesis.pdf
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
